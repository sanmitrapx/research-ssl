pct_start: 0.05
div_factor: 10.0
final_div_factor: 1000.0
dropout: 0.1
loss_type: ce_emd
weighted_emd: true
lambda_emd: 0.1
lambda_recon: 0.0
label_smoothing_sigma: 2.0
num_cp_bins_coarse: 32
lambda_coarse: 0.5
